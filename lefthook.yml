# All commands go through `mise x --` so they pick up the project's
# Ruby/Node from .mise.toml even when git invokes lefthook in a shell
# that hasn't activated mise.

pre-commit:
  parallel: true
  commands:
    rubocop:
      root: backend/
      glob: "*.{rb,rake}"
      run: mise x -- bundle exec rubocop --force-exclusion {staged_files}
      stage_fixed: true
    eslint:
      root: frontend/
      glob: "*.{js,jsx,ts,tsx}"
      run: mise x -- pnpm exec eslint --fix {staged_files}
      stage_fixed: true
    prettier:
      root: frontend/
      glob: "*.{js,jsx,ts,tsx,css,md,json}"
      run: mise x -- pnpm exec prettier --write {staged_files}
      stage_fixed: true

commit-msg:
  commands:
    commitlint:
      root: frontend/
      run: mise x -- pnpm exec commitlint --edit {1}

pre-push:
  parallel: true
  commands:
    backend-tests:
      root: backend/
      run: mise x -- bin/rspec --fail-fast
    frontend-tests:
      root: frontend/
      run: mise x -- pnpm test --run
    typecheck:
      root: frontend/
      run: mise x -- pnpm typecheck
    packwerk:
      root: backend/
      run: mise x -- bin/packwerk check
