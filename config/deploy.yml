# Kamal 2 deployment config.
# Replace placeholders before deploying:
#   <YOUR_REGISTRY_USER>, <YOUR_DOMAIN>, <SERVER_IP>, <REGISTRY>
# Run: kamal setup, kamal deploy

service: app
image: <YOUR_REGISTRY_USER>/app

servers:
  web:
    hosts:
      - <SERVER_IP>
    labels:
      traefik.http.routers.web.rule: Host(`<YOUR_DOMAIN>`)
  worker:
    hosts:
      - <SERVER_IP>
    cmd: bin/rails solid_queue:start

proxy:
  ssl: true
  host: <YOUR_DOMAIN>
  app_port: 3000
  healthcheck:
    path: /up
    interval: 5

registry:
  server: <REGISTRY> # e.g. ghcr.io
  username: <YOUR_REGISTRY_USER>
  password:
    - KAMAL_REGISTRY_PASSWORD

builder:
  arch: amd64
  context: ./backend
  dockerfile: Dockerfile

env:
  clear:
    RAILS_ENV: production
    RAILS_LOG_TO_STDOUT: "1"
    RAILS_SERVE_STATIC_FILES: "1"
    SOLID_QUEUE_IN_PUMA: "true"
  secret:
    - RAILS_MASTER_KEY
    - DATABASE_URL
    - JWT_SECRET
    - SENTRY_DSN_BACKEND

accessories:
  postgres:
    image: postgres:16
    host: <SERVER_IP>
    port: 5432
    env:
      clear:
        POSTGRES_USER: app
        POSTGRES_DB: app_production
      secret:
        - POSTGRES_PASSWORD
    directories:
      - data:/var/lib/postgresql/data

aliases:
  console: app exec --interactive --reuse "bin/rails console"
  shell:   app exec --interactive --reuse "bash"
  logs:    app logs -f
  dbc:     app exec --interactive --reuse "bin/rails dbconsole"
